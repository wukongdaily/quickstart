name: Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Build release
        run: |
          make tidy
          make release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            bin/quickstart-binary-*.tar.gz
            bin/quickstart-binary-*.tar.gz.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
